# ── wpewebkit-fdo .jpk recipe — WPE WebKit for Phantom browser ─────────────
# Library dependency for phantom-browser. Provides the WPE WebKit FDO platform
# backend (Wayland-compatible). Per SPEC §12.2 (wpewebkit-fdo ~30MB for Squirrel).
# Per-arch (amd64 + aarch64).

[meta]
schema_version = "1.0"
id              = "org.bsdos.wpewebkit-fdo"
version         = "2.38.0"
name            = "wpewebkit-fdo"
description     = "WPE WebKit FDO platform backend (Wayland webview rendering)"
homepage        = "https://wpewebkit.org/"
license         = "BSD-2-Clause"
authors         = ["Igalia S.L.", "bsdOS port team"]
maintainer      = "ports@bsdos.org"

[compatibility]
bsdos_codename_min = "Squirrel"
bsdos_codename_max = "Woodpecker"
freebsd_min        = "15.1"
freebsd_max        = "16.0"
arch               = ["amd64", "aarch64"]

[runtime]
type          = "jail"
jail_name     = "appBrowser"
needs_wayland = true
needs_input   = false
needs_gpu     = false
needs_audio   = false
needs_modem   = false

[dependencies]
glib2      = ">=2.74"
libsoup    = ">=3.0"

[permissions]
capabilities    = ["CAP_READ", "CAP_WRITE", "CAP_EVENT"]
network         = "inet"
filesystem      = "ro"
max_open_files  = 512
max_memory_mb   = 256
max_cpu_percent = 50
max_disk_mb     = 128
network_ingress = false
network_egress  = true

[update]
channel     = "stable"
auto_update = true

[discovery]
keywords = ["webkit", "wpe", "web", "rendering"]
category = "System"
