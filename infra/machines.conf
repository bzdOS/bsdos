# infra/machines.conf — single source of truth for bsdOS target "machines".
#
# A "machine" subsumes everything a build needs to know about a target:
#   arch      — CPU architecture (amd64 | aarch64)
#   kernconf  — kernel config name (GENERIC for bring-up; custom = phase-2 optimization)
#   platform  — platform flag passed to Zig (-Dplatform=) and Rust (BSDOS_PLATFORM=)
#   pkgset    — name of infra/pkgsets/<pkgset>.txt package manifest
#
# POSIX sh — no bashisms. Sourced by bsdos-build.sh:
#   . infra/machines.conf
#   machine_resolve qemu-amd64
#   echo "$M_ARCH $M_KERNCONF $M_PLATFORM $M_PKGSET"
#
# ── Machine table (reference) ───────────────────────────────────────────────
# machine        arch      kernconf                  platform        pkgset
# qemu-amd64     amd64     BSDOS-SQUIRREL-AMD64      qemu_amd64      qemu
# qemu-aarch64   aarch64   GENERIC                   qemu_aarch64    qemu
# bpi-m64        aarch64   GENERIC                   bpi_m64         bpi-headless
# pinephone  aarch64   GENERIC                   pinephone   phone
#
# ARCHITECTURAL DECISION (locked): for bring-up of every non-amd64 machine,
# kernconf=GENERIC. A custom kernel is a phase-2 optimization, NOT a bring-up
# requirement. Only qemu-amd64 uses the custom BSDOS-SQUIRREL-AMD64 kernel
# (it already exists and works in the primary dev loop).

# ── machine_resolve <machine> ───────────────────────────────────────────────
# purpose:     resolve a machine name to its arch/kernconf/platform/pkgset
# input:       $1 = machine name (qemu-amd64 | qemu-aarch64 | bpi-m64 | pinephone)
# output:      exports M_ARCH, M_KERNCONF, M_PLATFORM, M_PKGSET; M_MACHINE = canonical name
# sideEffects: writes to stderr + returns non-zero on unknown machine
machine_resolve() {
    machine_resolve_in="${1:-}"
    case "$machine_resolve_in" in
        qemu-amd64)
            M_ARCH="amd64"
            M_KERNCONF="BSDOS-SQUIRREL-AMD64"
            M_PLATFORM="qemu_amd64"
            M_PKGSET="qemu"
            ;;
        qemu-aarch64)
            M_ARCH="aarch64"
            M_KERNCONF="GENERIC"
            M_PLATFORM="qemu_aarch64"
            M_PKGSET="qemu"
            ;;
        bpi-m64)
            M_ARCH="aarch64"
            M_KERNCONF="GENERIC"
            M_PLATFORM="bpi_m64"
            M_PKGSET="bpi-headless"
            ;;
        pinephone)
            M_ARCH="aarch64"
            M_KERNCONF="GENERIC"
            M_PLATFORM="pinephone"
            M_PKGSET="phone"
            ;;
        *)
            echo "machine_resolve: unknown machine '$machine_resolve_in'" >&2
            echo "  known: qemu-amd64 qemu-aarch64 bpi-m64 pinephone" >&2
            return 1
            ;;
    esac
    M_MACHINE="$machine_resolve_in"
    export M_MACHINE M_ARCH M_KERNCONF M_PLATFORM M_PKGSET
}
